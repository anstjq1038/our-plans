<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>여행 플래너</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>✈️</text></svg>" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div class="page">

    <!-- 헤더 -->
    <header class="hero">
      <div class="hero-top">
        <span class="hero-badge" id="storage-badge">로컬 모드</span>
      </div>
      <h1 id="trip-title">여행 플래너</h1>
      <p class="hero-sub" id="trip-sub"></p>
    </header>

    <!-- 요약 타일 -->
    <section class="stat-row" id="stat-row"></section>

    <!-- 일정 -->
    <section class="card">
      <h2>📅 일정</h2>
      <nav class="day-tabs" id="day-tabs"></nav>
      <p class="day-theme" id="day-theme"></p>
      <ol class="timeline" id="timeline"></ol>
    </section>

    <div class="two-col">
      <!-- 예산 -->
      <section class="card">
        <h2>💰 1인 예산</h2>
        <p class="budget-total" id="budget-total"></p>
        <div class="budget-bars" id="budget-bars"></div>
      </section>

      <!-- 준비물 -->
      <section class="card">
        <h2>🎒 준비물 체크리스트</h2>
        <ul class="checklist" id="checklist"></ul>
        <p class="hint">체크 상태는 각자 브라우저에 저장돼요.</p>
      </section>
    </div>

    <!-- 이름 입력 -->
    <section class="card name-card">
      <h2>🙋 참여하기</h2>
      <p class="hint">투표하고 의견을 남기려면 이름을 알려주세요.</p>
      <div class="name-form">
        <input type="text" id="user-name" placeholder="이름 또는 별명" maxlength="20" />
        <button id="save-name" class="btn primary">저장</button>
      </div>
    </section>

    <!-- 투표 -->
    <section class="card">
      <h2>🗳️ 투표</h2>
      <div id="polls"></div>
    </section>

    <!-- 의견 -->
    <section class="card">
      <h2>💬 의견 &amp; 제안</h2>
      <div class="comment-form">
        <textarea id="comment-text" rows="2" placeholder="가고 싶은 곳, 바꾸고 싶은 일정 등 자유롭게!"></textarea>
        <button id="send-comment" class="btn primary">남기기</button>
      </div>
      <ul class="comments" id="comments"></ul>
    </section>

    <footer class="foot">
      <p>이 대시보드는 Claude Code 여행 플래너 에이전트가 관리합니다 ✈️</p>
    </footer>
  </div>

  <!-- Firebase (설정돼 있을 때만 활성화) -->
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

  <script src="js/plan-data.js"></script>
  <script src="js/firebase-config.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
